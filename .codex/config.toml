[mcp_servers.21st-magic]
command = "npx"
args = [
    "-y",
    "@21st-dev/magic@latest",
]

[mcp_servers.21st-magic.env]
API_KEY = ""

[mcp_servers.magicuidesign-mcp]
command = "npx"
args = [
    "-y",
    "@magicuidesign/mcp@latest",
]

[mcp_servers.nanobanana]
command = 'C:\Users\samue\.local\bin\uvx.exe'
args = ["nanobanana-mcp-server"]

[mcp_servers.nanobanana.env]
GEMINI_API_KEY = ""

[mcp_servers.playwright]
command = "npx"
args = [
    "@playwright/mcp@latest",
    "--browser",
    "chromium",
]

[mcp_servers.shadcn]
command = "npx"
args = [
    "shadcn@latest",
    "mcp",
]

[mcp_servers.stitch]
command = "npx"
args = [
    "-y",
    "stitch-mcp",
]

[mcp_servers.stitch.env]
GOOGLE_CLOUD_PROJECT = "sixteam-design"
STITCH_API_KEY = ""
