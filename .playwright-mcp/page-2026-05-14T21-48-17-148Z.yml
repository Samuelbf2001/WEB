              - img [ref=e619]
            - paragraph [ref=e623]:
              - text: Yes, we work with clients of all sizes, from enterprise-level organizations to startups. We are passionate about helping startups bring their ideas to life and achieve their goals through the power of design and technology. Additionally, we possess the expertise to assist in scaling your product or marketing efforts to enter new markets or reach different target audiences.
              - text: One of our most common scenarios involves preparing SaaS startups to cater to enterprise clients by revamping their brand, product, and marketing site. We have partnered with numerous early-stage companies, including Coinbase, Uber, SendGrid, and MoneyLion, who have emerged as leaders in their respective industries.
              - text: Conversely, other startups we have collaborated with, such as Earnin, experienced significant success after we redesigned their app, securing over $100M in additional venture funding.
              - text: If you are a startup seeking to discuss your project needs, we would be delighted to initiate the conversation. To schedule a consultation with our team, please get in touch with us at hey@clay.global. We will work closely with you to comprehend your vision, goals, and budget, ensuring a tailored approach to your project.
          - generic [ref=e624]:
            - button "Can you help us redesign our B2B/enterprise software?" [ref=e625] [cursor=pointer]:
              - generic [ref=e626]: Can you help us redesign our B2B/enterprise software?
              - img [ref=e627]
            - paragraph [ref=e631]:
              - text: We're one of the few user experience agencies focusing on enterprise UX design and the digital transformation of legacy business software. Our years of experience have allowed us to refine our process, enabling us to revitalize B2B software for top-tier Fortune 100 companies like ADP, Amazon, VMware, and Cisco.
              - text: Through our ultra-collaborative process and design thinking approach, we create consumer-grade user experiences for business users. We prioritize scalability and longevity by empowering our clients' in-house teams with robust design systems. This ensures continuity and adaptability, enabling the organization to evolve and grow seamlessly.
              - text: We usually function as an independent unit within the organizational structure. Operating like a startup, we inject agility and fresh perspectives into the sometimes bureaucratic enterprise environment. This approach helps us navigate complex hierarchies and decision-making processes swiftly and efficiently, delivering innovative solutions.
